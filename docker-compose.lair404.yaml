version: '3.8'

services:
  mail-zero:
    image: ghcr.io/lair404xyz/mail-zero:latest
    container_name: mail-zero
    restart: always
    init: true
    env_file: .env
    environment:
      NODE_ENV: production
      VITE_PUBLIC_BACKEND_URL: https://mail.lair404.xyz
      VITE_PUBLIC_APP_URL: https://mail.lair404.xyz
      NEXT_PUBLIC_BACKEND_URL: https://mail.lair404.xyz
      NEXT_PUBLIC_APP_URL: https://mail.lair404.xyz
    command: ["/bin/sh", "-c", "/app/scripts/replace-placeholder.sh 'http://REPLACE-BACKEND-URL.com' 'https://mail.lair404.xyz' && /app/scripts/replace-placeholder.sh 'http://REPLACE-APP-URL.com' 'https://mail.lair404.xyz' && cd /app/apps/mail/build/client && exec npx --yes serve -s -l 3000"]
    depends_on:
      mail-zero-server:
        condition: service_started
    ports:
      - "127.0.0.1:3050:3000"
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://127.0.0.1:3000']
      interval: 90s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - mail-zero-net
    labels:
      - "com.lair404.service=mail-zero"
      - "com.lair404.port=3050"

  mail-zero-server:
    image: ghcr.io/lair404xyz/mail-zero-server-node:latest
    container_name: mail-zero-server
    restart: always
    init: true
    env_file: .env
    network_mode: host
    environment:
      NODE_ENV: production
      PORT: "3051"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5436/${POSTGRES_DB}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: https://mail.lair404.xyz
      CF_ACCESS_AUD: ${CF_ACCESS_AUD:?required}
      CF_ACCESS_TEAM_DOMAIN: weretrade.cloudflareaccess.com
      IMAP_PROXY_URL: http://127.0.0.1:3060
      IMAP_URL: ${IMAP_URL:?required}
      SMTP_URL: ${SMTP_URL:?required}
      APP_URL: https://mail.lair404.xyz
      CORS_ORIGINS: https://mail.lair404.xyz
      COOKIE_DOMAIN: .lair404.xyz
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?required}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?required}
    depends_on:
      mail-zero-db:
        condition: service_healthy
      mail-zero-imap-proxy:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://127.0.0.1:3051/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "com.lair404.service=mail-zero-server"
      - "com.lair404.port=3051"

  mail-zero-imap-proxy:
    image: ghcr.io/lair404xyz/mail-zero-imap-proxy:latest
    container_name: mail-zero-imap-proxy
    restart: always
    init: true
    env_file: .env
    network_mode: host
    environment:
      PORT: "3060"
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://127.0.0.1:3060/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "com.lair404.service=mail-zero-imap-proxy"
      - "com.lair404.port=3060"

  mail-zero-mcp:
    image: ghcr.io/lair404xyz/mail-zero-server-node:latest
    container_name: mail-zero-mcp
    restart: always
    init: true
    env_file: .env
    network_mode: host
    environment:
      NODE_ENV: production
      PORT: "5008"
      MCP_TRANSPORT: "sse"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5436/${POSTGRES_DB}
    command: ["node", "dist/mcp-server.js"]
    depends_on:
      mail-zero-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://127.0.0.1:5008/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "com.lair404.service=mail-zero-mcp"
      - "com.lair404.port=5008"

  google-workspace-mcp:
    image: ghcr.io/lair404xyz/google-workspace-mcp:latest
    container_name: google-workspace-mcp
    restart: always
    init: true
    env_file: .env
    network_mode: host
    environment:
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:?required}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:?required}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN}
      WORKSPACE_MCP_PORT: "5009"
      GOOGLE_OAUTH_REDIRECT_URI: "https://mail.lair404.xyz/oauth2callback"
      WORKSPACE_MCP_BASE_URI: "https://mail.lair404.xyz"
      PORT: "5009"
      MCP_SINGLE_USER_MODE: "1"
      MCP_API_KEY: ${GWS_MCP_API_KEY}
      USER_GOOGLE_EMAIL: ${MAIL_ZERO_USER_EMAIL}
      WORKSPACE_MCP_CREDENTIALS_DIR: /app/store_creds
    volumes:
      - google-workspace-mcp-creds:/app/store_creds
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:5009/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "com.lair404.service=google-workspace-mcp"
      - "com.lair404.port=5009"

  mail-zero-db:
    image: postgres:17-alpine
    container_name: mail-zero-db
    restart: always
    init: true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mailzero}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-mailzero}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - mail-zero-postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5436:5432"
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${POSTGRES_USER:-mailzero}', '-d', '${POSTGRES_DB:-mailzero}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mail-zero-net
    labels:
      - "com.lair404.service=mail-zero-db"

  mail-zero-valkey:
    image: docker.io/bitnami/valkey:latest
    container_name: mail-zero-valkey
    restart: always
    init: true
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - VALKEY_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    volumes:
      - mail-zero-valkey:/bitnami/valkey/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-h', 'localhost', '-p', '6379', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mail-zero-net
    labels:
      - "com.lair404.service=mail-zero-valkey"

  mail-zero-upstash-proxy:
    image: hiett/serverless-redis-http:latest
    container_name: mail-zero-upstash-proxy
    restart: always
    init: true
    environment:
      SRH_MODE: env
      SRH_TOKEN: ${REDIS_TOKEN:?required}
      SRH_CONNECTION_STRING: 'redis://mail-zero-valkey:6379'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://127.0.0.1:80']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mail-zero-net
    labels:
      - "com.lair404.service=mail-zero-upstash-proxy"

networks:
  mail-zero-net:
    driver: bridge

volumes:
  mail-zero-postgres:
    name: mail-zero-postgres
  mail-zero-valkey:
    name: mail-zero-valkey
  google-workspace-mcp-creds:
    name: google-workspace-mcp-creds
