server {
    listen 80;
    listen [::]:80;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mail.n1njanode.com;


    ssl_certificate /etc/letsencrypt/live/mail.n1njanode.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.n1njanode.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~ "^\/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/mail/(.*)$" {
        return 302 /mail/$1;
    }

    location ~ ^/trpc/categories\.defaults { default_type application/json; return 200 '[{"result":{"data":{"json":[]}}}]'; }
    location ~ ^/trpc/user\.getIntercomToken { default_type application/json; return 200 '[{"result":{"data":{"json":null}}}]'; }
    location ~ ^/trpc/bimi\.getByEmail { default_type application/json; return 200 '[{"result":{"data":{"json":null}}}]'; }
    location ~ ^/trpc/mail\.suggestRecipients { default_type application/json; return 200 '[{"result":{"data":{"json":[]}}}]'; }

    location ~ /api/autumn/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, CF-Access-Jwt-Assertion" always;
        if ($request_method = OPTIONS) { return 204; }
        return 200 '{"customerId":"self-hosted","plan":"pro_annual","features":{"connections":{"unlimited":true,"balance":999,"included_usage":999,"usage":0,"next_reset_at":null,"interval":""},"chat-messages":{"unlimited":true,"balance":999,"included_usage":999,"usage":0,"next_reset_at":null,"interval":""},"brain-activity":{"unlimited":true,"balance":999,"included_usage":999,"usage":0,"next_reset_at":null,"interval":""}},"unlimited":true,"credits":null,"products":[{"id":"pro_annual","name":"Pro Annual","status":"active"}]}';
    }

    location = /api/public/providers {
        default_type application/json;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        return 200 '{"allProviders":[{"id":"zero","name":"Sign In","enabled":true,"isCustom":true,"customRedirectPath":"/cf-access/callback"}]}';
    }

    location = / { return 302 /cf-access/callback; }
    location = /login { return 302 /cf-access/callback; }

    location /cf-access/ {
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_connect_timeout 60s; proxy_send_timeout 60s; proxy_read_timeout 60s;
    }

    location ~ /api/trpc/(.+)$ {
        rewrite ^.*/api/trpc/(.+)$ /trpc/$1 last;
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
        proxy_connect_timeout 60s; proxy_send_timeout 60s; proxy_read_timeout 60s;
    }

    location ~ ^/trpc/(.+)$ {
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
        proxy_set_header CF-Access-Email $http_cf_access_email;
        proxy_set_header CF-Access-User $http_cf_access_user;
        proxy_connect_timeout 60s; proxy_send_timeout 60s; proxy_read_timeout 60s;
    }

    location /api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, CF-Access-Jwt-Assertion" always;
            add_header Access-Control-Allow-Credentials "true" always;
            return 204;
        }
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_set_header CF-Access-Email $http_cf_access_email;
        proxy_set_header CF-Access-User $http_cf_access_user;
        proxy_connect_timeout 60s; proxy_send_timeout 60s; proxy_read_timeout 60s;
    }

    location /trpc/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, CF-Access-Jwt-Assertion" always;
            add_header Access-Control-Allow-Credentials "true" always;
            return 204;
        }
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_set_header CF-Access-Email $http_cf_access_email;
        proxy_set_header CF-Access-User $http_cf_access_user;
        proxy_connect_timeout 60s; proxy_send_timeout 60s; proxy_read_timeout 60s;
    }

    location ~ ^/mail/[^/]+/api/trpc/(.+)$ { rewrite ^/mail/[^/]+/api/trpc/(.+)$ /trpc/$1 last; }
    location ~ ^/mail/[^/]+/api/(.+)$ {
        rewrite ^/mail/[^/]+/api/(.+)$ /api/$1 break;
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_connect_timeout 60s; proxy_send_timeout 60s; proxy_read_timeout 60s;
    }

    location ~ ^/[0-9a-f-]+/api/trpc/ {
        rewrite ^/[0-9a-f-]+/api/trpc/(.*) /trpc/$1 last;
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_connect_timeout 60s; proxy_send_timeout 60s; proxy_read_timeout 60s;
    }

        location /agents/ {
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    location = /oauth2callback {
        proxy_pass http://127.0.0.1:5009;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3050;
        
        # Prevent caching of HTML files so updates propagate instantly
        if ($request_uri ~* "^/($|[^.]*\.html?)") {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_set_header CF-Access-Email $http_cf_access_email;
        proxy_set_header CF-Access-User $http_cf_access_user;
        proxy_connect_timeout 60s; proxy_send_timeout 60s; proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/mail.n1njanode.com.access.log;
    error_log /var/log/nginx/mail.n1njanode.com.error.log;
}
