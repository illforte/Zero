# Nginx configuration for mail.lair404.xyz
# Current production config (synced 2026-02-21)
#
# Install: sudo cp nginx-lair404.conf /etc/nginx/sites-available/mail.lair404.xyz
#          sudo ln -s /etc/nginx/sites-available/mail.lair404.xyz /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name mail.lair404.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mail.lair404.xyz;

    ssl_certificate /etc/letsencrypt/live/mail.lair404.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.lair404.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------------------------
    # Legacy URL redirect: /{connectionId}/mail/* → /mail/*
    # The original Zero app used /{connectionId}/mail/inbox as its URL scheme.
    # Our fork uses /mail/inbox (no connectionId prefix). Redirect old URLs.
    # -------------------------------------------------------------------------
    location ~ "^\/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/mail/(.*)$" {
        return 302 /mail/$1;
    }

    # -------------------------------------------------------------------------
    # tRPC path rewrite: /api/trpc/* → /trpc/* (re-evaluated against stubs below)
    # Use 'last' so the rewritten URI matches stub location blocks.
    # -------------------------------------------------------------------------
    location ~ /api/trpc/(.+)$ {
        rewrite ^.*/api/trpc/(.+)$ /trpc/$1 last;
    }

    # -------------------------------------------------------------------------
    # tRPC stubs — cloud-only procedures not available on self-hosted backend.
    # nginx returns static JSON so the frontend doesn't get 404 errors.
    # -------------------------------------------------------------------------
    location ~ ^/trpc/categories\.defaults {
        default_type application/json;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        return 200 '[{"result":{"data":{"json":[]}}}]';
    }
    location ~ ^/trpc/user\.getIntercomToken {
        default_type application/json;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        return 200 '[{"result":{"data":{"json":null}}}]';
    }
    location ~ ^/trpc/bimi\.getByEmail {
        default_type application/json;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        return 200 '[{"result":{"data":{"json":null}}}]';
    }
    location ~ ^/trpc/brain.getPrompts {
        default_type application/json;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        return 200 '[{"result":{"data":{"json":[]}}}]';
    }
    location ~ ^/trpc/brain.generateSummary {
        default_type application/json;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        return 200 '[{"result":{"data":{"json":null}}}]';
    }
    location ~ ^/trpc/ai.webSearch {
        default_type application/json;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        return 200 '[{"result":{"data":{"json":[]}}}]';
    }
    location ~ ^/trpc/mail\.suggestRecipients {
        default_type application/json;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        return 200 '[{"result":{"data":{"json":[]}}}]';
    }

    # -------------------------------------------------------------------------
    # tRPC: direct /trpc/* paths → backend (port 3051)
    # Must come AFTER the stub location blocks above.
    # -------------------------------------------------------------------------
    location ~ ^/trpc/(.+)$ {
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
        proxy_set_header CF-Access-Email $http_cf_access_email;
        proxy_set_header CF-Access-User $http_cf_access_user;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # -------------------------------------------------------------------------
    # Autumn billing stub — self-hosted = unlimited Pro plan (no billing needed)
    # -------------------------------------------------------------------------
    location ~ /api/autumn/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, CF-Access-Jwt-Assertion" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
        return 200 '{"customerId":"self-hosted","plan":"pro_annual","features":{"connections":{"unlimited":true,"balance":999,"included_usage":999,"usage":0,"next_reset_at":null,"interval":""},"chat-messages":{"unlimited":true,"balance":999,"included_usage":999,"usage":0,"next_reset_at":null,"interval":""},"brain-activity":{"unlimited":true,"balance":999,"included_usage":999,"usage":0,"next_reset_at":null,"interval":""}},"unlimited":true,"credits":null,"products":[{"id":"pro_annual","name":"Pro Annual","status":"active"}]}';
    }

    # -------------------------------------------------------------------------
    # Auth & CF Access
    # -------------------------------------------------------------------------

    # API bypass for public health checks
    location ^~ /health {
        access_log off;
        proxy_pass http://127.0.0.1:3051/health;
        proxy_set_header Host $host;
        # Clear auth headers for public health check
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";
    }

    # Session bootstrap: redirect root → CF Access callback (always succeeds as CF JWT is present)
    location = / {
        return 302 /cf-access/callback;
    }

    # Auto-login: /login → CF Access callback (no manual click needed)
    location = /login {
        return 302 /cf-access/callback;
    }

    # /api/public/providers stub — returns "Sign In" button pointing at CF Access callback
    location = /api/public/providers {
        default_type application/json;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        return 200 '{"allProviders":[{"id":"zero","name":"Sign In","enabled":true,"isCustom":true,"customRedirectPath":"/cf-access/callback"}]}';
    }

    location /cf-access/ {
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # -------------------------------------------------------------------------
    # API → backend (port 3051)
    # -------------------------------------------------------------------------
    location /api/trpc/ {
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_set_header CF-Access-Email $http_cf_access_email;
        proxy_set_header CF-Access-User $http_cf_access_user;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /trpc/ {
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_set_header CF-Access-Email $http_cf_access_email;
        proxy_set_header CF-Access-User $http_cf_access_user;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # -------------------------------------------------------------------------
    # UUID-prefixed path rewrites (legacy /{connectionId}/api/* → /api/*)
    # -------------------------------------------------------------------------
    location ~ ^/mail/[^/]+/api/trpc/(.+)$ {
        rewrite ^/mail/[^/]+/api/trpc/(.+)$ /trpc/$1 last;
    }

    location ~ ^/mail/[^/]+/api/(.+)$ {
        rewrite ^/mail/[^/]+/api/(.+)$ /api/$1 break;
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ ^/[0-9a-f-]+/api/trpc/ {
        rewrite ^/[0-9a-f-]+/api/trpc/(.*) /trpc/$1 last;
    }

    location ~ ^/[0-9a-f-]+/api/ {
        rewrite ^/[0-9a-f-]+/api/(.*) /api/$1 break;
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # -------------------------------------------------------------------------
    # AI Agent WebSocket — proxy to backend Node.js server (port 3051)
    # Uses cf_agent protocol; requires long read timeout for streaming.
    # -------------------------------------------------------------------------
    location /agents/ {
        proxy_pass http://127.0.0.1:3051;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    # -------------------------------------------------------------------------
    # Frontend (port 3050) — catch-all, must be last
    # -------------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_set_header CF-Access-Email $http_cf_access_email;
        proxy_set_header CF-Access-User $http_cf_access_user;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/mail.lair404.xyz.access.log;
    error_log /var/log/nginx/mail.lair404.xyz.error.log;
}
